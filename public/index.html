<!DOCTYPE html>
<html>
<head>
    <title>PODDA-MD TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.5; }
        .main { position: relative; z-index: 1; text-align: center; padding-top: 50px; }
        .terminal { background: rgba(0, 20, 0, 0.9); border: 1px solid #0f0; display: inline-block; padding: 30px; box-shadow: 0 0 20px #0f0; width: 350px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 80%; margin: 10px; text-align: center; }
        button { background: #0f0; color: #000; border: none; padding: 10px; width: 85%; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #000; color: #0f0; outline: 1px solid #0f0; }
        #status { margin: 15px; font-size: 12px; height: 40px; color: #00ffcc; }
        #result { font-size: 40px; color: #fff; text-shadow: 0 0 10px #0f0; margin: 10px; }
    </style>
</head>
<body>
    <canvas id="m"></canvas>
    <div class="main">
        <div class="terminal">
            <h1>PODDA-MD</h1>
            <input type="text" id="num" placeholder="Enter Number (947...)">
            <button onclick="getPair()">GET PAIRING CODE</button>
            <button onclick="getQR()" style="background:#f0f; color:#fff;">GET QR CODE</button>
            <div id="status">SYSTEM IDLE...</div>
            <div id="result"></div>
            <img id="qr" style="display:none; width:200px; margin: 10px auto; border: 3px solid #fff;">
        </div>
    </div>
    <script>
        const c = document.getElementById('m');
        const x = c.getContext('2d');
        c.height = window.innerHeight; c.width = window.innerWidth;
        const s = Array(200).fill(1);
        function draw() {
            x.fillStyle = "rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = "#0f0";
            s.forEach((y, i) => {
                x.fillText(Math.floor(Math.random()*2), i*20, y);
                if(y > c.height && Math.random() > 0.975) s[i] = 0;
                s[i] += 20;
            });
        }
        setInterval(draw, 50);

        async function getPair() {
            const n = document.getElementById('num').value;
            if(!n) return;
            document.getElementById('qr').style.display='none';
            document.getElementById('status').innerHTML = "INITIALIZING BRUTEFORCE...<br>WAITING 15 SECONDS...";
            try {
                const res = await axios.get(`pairing?number=${n}`);
                document.getElementById('result').innerText = res.data.code;
                document.getElementById('status').innerText = "ACCESS GRANTED!";
            } catch(e) { document.getElementById('status').innerText = "ERROR! RETRY."; }
        }

        async function getQR() {
            document.getElementById('result').innerText = "";
            document.getElementById('status').innerText = "GENERATING QR...";
            try {
                const res = await axios.get(`qr`);
                document.getElementById('qr').src = res.data.qr;
                document.getElementById('qr').style.display = 'block';
                document.getElementById('status').innerText = "SCAN NOW";
            } catch(e) { document.getElementById('status').innerText = "QR ERROR"; }
        }
    </script>
</body>
</html>
