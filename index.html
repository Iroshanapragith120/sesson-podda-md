<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PODDA MD SESSION GENERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* උඹේ පින්තූරය බැක්ග්‍රවුන්ඩ් එකට */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('download (14).jfif') no-repeat center center/cover;
            opacity: 0.2; z-index: -2;
        }

        #matrix { position: fixed; top: 0; left: 0; z-index: -1; }

        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: #0f0; text-align: center;
        }

        .glass-box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #0f0;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px #0f0;
            width: 350px;
        }

        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
        
        input {
            width: 90%; padding: 12px; margin-bottom: 20px;
            background: transparent; border: 1px solid #0f0;
            color: #0f0; border-radius: 5px; text-align: center; outline: none;
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0;
            background: transparent; border: 2px solid #0f0;
            color: #0f0; font-weight: bold; cursor: pointer;
            transition: 0.4s; border-radius: 5px; text-transform: uppercase;
        }

        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }

        #result { margin-top: 20px; font-size: 18px; color: #fff; font-weight: bold; min-height: 30px; }
        
        .footer { position: fixed; bottom: 10px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>

    <div class="main-container">
        <div class="glass-box">
            <h1>PODDA-MD SESSION</h1>
            <p style="font-size: 12px; margin-bottom: 20px;">Enter Number With Country Code</p>
            
            <input type="text" id="phoneNumber" placeholder="947xxxxxxxx">
            
            <button class="btn" onclick="getPairing()">Get Pairing Code</button>
            <button class="btn" style="border-color: #ff00ea; color: #ff00ea;" onclick="getQR()">Scan QR Code</button>

            <div id="result">Waiting for command...</div>
        </div>
        <div class="footer">MADE BY PODDA MD TEAM</div>
    </div>

    <script>
        // --- Matrix Effect ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "01010101010101010101PODDAMD010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        // --- Frontend Logic ---
        async function getPairing() {
            const num = document.getElementById('phoneNumber').value;
            if (!num) return alert("Enter number!");
            document.getElementById('result').innerText = "REQUESTING...";
            
            try {
                const response = await axios.get(`/pairing?number=${num}`);
                document.getElementById('result').innerHTML = `YOUR CODE: <span style="color:#ff0;">${response.data.code}</span>`;
            } catch (err) {
                document.getElementById('result').innerText = "ERROR!";
            }
        }

        function getQR() {
            document.getElementById('result').innerText = "QR FEATURE COMING SOON...";
        }
    </script>
</body>
</html>
